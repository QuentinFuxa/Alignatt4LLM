<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="380" viewBox="0 0 1080 380" role="img" aria-labelledby="title desc">
  <title id="title">AlignAtt4LLM streaming architecture</title>
  <desc id="desc">Audio enters Qwen ASR, forced alignment creates a committed source prefix, Gemma-family MT drafts target text, and AlignAtt commits the safe target prefix.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a4a"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #c8ced8; stroke-width: 1.5; rx: 8; }
      .asr { fill: #eaf4ff; stroke: #4d87bd; }
      .mt { fill: #eef8ed; stroke: #4f9557; }
      .policy { fill: #fff5e8; stroke: #b7792f; }
      .out { fill: #f2eefb; stroke: #7659ad; }
      .title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .text { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526070; }
      .arrow { stroke: #2f3a4a; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="380"/>
  <text x="40" y="44" class="title">AlignAtt4LLM: synchronous ASR-to-MT cascade</text>
  <text x="40" y="70" class="text">Decoder-only AlignAtt commits target text when reconstructed attention stays inside the accessible source frontier.</text>

  <rect x="42" y="120" width="150" height="130" class="panel"/>
  <text x="72" y="166" class="title">Audio</text>
  <text x="66" y="194" class="text">streaming</text>
  <text x="76" y="216" class="small">16 kHz chunks</text>

  <line x1="196" y1="185" x2="262" y2="185" class="arrow"/>
  <rect x="270" y="104" width="170" height="162" class="panel asr"/>
  <text x="305" y="146" class="title">Qwen3-ASR</text>
  <text x="303" y="174" class="text">incremental</text>
  <text x="302" y="196" class="text">source transcript</text>
  <text x="302" y="225" class="small">with forced alignment</text>

  <line x1="444" y1="185" x2="510" y2="185" class="arrow"/>
  <rect x="518" y="104" width="170" height="162" class="panel"/>
  <text x="552" y="146" class="title">Source Prefix</text>
  <text x="548" y="174" class="text">committed words</text>
  <text x="548" y="196" class="text">and timings</text>
  <text x="548" y="225" class="small">accessible frontier</text>

  <line x1="692" y1="185" x2="758" y2="185" class="arrow"/>
  <rect x="766" y="104" width="170" height="162" class="panel mt"/>
  <text x="800" y="146" class="title">Gemma / MiLMMT</text>
  <text x="802" y="174" class="text">decoder-only MT</text>
  <text x="802" y="196" class="text">draft continuation</text>
  <text x="802" y="225" class="small">vLLM Q/K capture</text>

  <path d="M 851 268 C 851 322, 642 322, 604 270" class="arrow"/>
  <rect x="452" y="292" width="302" height="58" class="panel policy"/>
  <text x="480" y="325" class="title">AlignAtt policy: safe prefix only</text>

  <line x1="940" y1="185" x2="1004" y2="185" class="arrow"/>
  <rect x="1012" y="120" width="32" height="130" class="panel out"/>
  <text x="996" y="276" class="small">append-only output</text>
</svg>
